version: '3.8'

services:
  web:
    image: ${IMAGE_NAME:-ghcr.io/trungthanhbmtran/ebook_dn}:${IMAGE_TAG:-latest}
    container_name: ebook_nextjs
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    container_name: ebook_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
