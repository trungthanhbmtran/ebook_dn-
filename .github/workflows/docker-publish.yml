name: CI/CD Pipeline

on:
  push:
    branches: ['main']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Chuyển repository name thành chữ thường để ghcr.io không bị lỗi
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Continuous Integration (Build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Format IMAGE_NAME
        run: |
          # Chuyển chữ thường
          LOWER_NAME="${IMAGE_NAME,,}"
          # Xóa dấu gạch ngang ở cuối (nếu có) để không bị lỗi Docker tag
          CLEAN_NAME="${LOWER_NAME%-}"
          echo "IMAGE_NAME=${CLEAN_NAME}" >> ${GITHUB_ENV}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Continuous Deployment (VPS)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deployment directory on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: mkdir -p ~/Ebook_DN/nginx

      - name: Copy configurations to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "docker-compose.yml,nginx/nginx.conf"
          target: "~/Ebook_DN"

      - name: Deploy and restart services
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          envs: GH_TOKEN
          script: |
            cd ~/Ebook_DN
            
            # 1. Xử lý tên ảnh: Chuyển chữ thường và xóa dấu gạch ngang ở cuối
            export RAW_IMAGE_NAME="${{ github.repository }}"
            export LOWER_NAME="${RAW_IMAGE_NAME,,}"
            export CLEAN_NAME="${LOWER_NAME%-}"
            export IMAGE_NAME="ghcr.io/${CLEAN_NAME}"
            export IMAGE_TAG="sha-${GITHUB_SHA::7}"
            
            echo "Deploying image: $IMAGE_NAME:$IMAGE_TAG"
            
            # 2. Đăng nhập vào GHCR để pull image (Dùng token của Github Actions)
            echo "$GH_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 3. Kéo image MỚI NHẤT ứng với mã SHA của commit này
            docker compose pull
            
            # 4. Khởi động lại ứng dụng (Zero-downtime recreation)
            docker compose up -d
            
            # 5. Dọn dẹp rác (xóa các image cũ để tránh đầy ổ cứng VPS)
            docker image prune -af
