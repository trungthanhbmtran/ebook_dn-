name: CI/CD Pipeline

on:
  push:
    branches: ['main']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Chuyển repository name thành chữ thường để ghcr.io không bị lỗi
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Continuous Integration (Build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Format IMAGE_NAME
        run: |
          # Chuyển chữ thường
          LOWER_NAME="${IMAGE_NAME,,}"
          # Xóa dấu gạch ngang ở cuối (nếu có) để không bị lỗi Docker tag
          CLEAN_NAME="${LOWER_NAME%-}"
          echo "IMAGE_NAME=${CLEAN_NAME}" >> ${GITHUB_ENV}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

